services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Bind to localhost only — Nginx handles the public HTTPS traffic.
      # Change to "8000:8000" if testing without Nginx (not recommended in production).
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./credentials:/app/credentials
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
